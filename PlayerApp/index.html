<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk Player — הגדרה</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#080812;color:#f1f5f9;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    font-size:21px;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}

  .card{
    width:480px;background:#13132a;border:1px solid rgba(255,255,255,0.12);
    border-radius:20px;padding:40px;
    box-shadow:0 16px 64px rgba(0,0,0,0.8)
  }

  .logo{display:flex;align-items:center;gap:14px;margin-bottom:32px}
  .logo-icon{
    width:48px;height:48px;border-radius:13px;flex-shrink:0;
    background:linear-gradient(135deg,#6366f1,#a78bfa);
    display:flex;align-items:center;justify-content:center;
    font-size:30px;font-weight:900;color:#fff;
    box-shadow:0 0 20px rgba(99,102,241,0.4)
  }
  .logo-text h1{font-size:27px;font-weight:700;color:#f1f5f9}
  .logo-text p{font-size:18px;color:#64748b;margin-top:2px}

  .step{
    display:flex;align-items:center;gap:10px;
    background:#0e0e1c;border:1px solid rgba(255,255,255,0.07);
    border-radius:10px;padding:14px;margin-bottom:20px;font-size:18px;color:#64748b
  }
  .step-num{
    width:22px;height:22px;border-radius:50%;background:#6366f1;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:700;color:#fff;flex-shrink:0
  }

  label{display:block;font-size:18px;font-weight:600;color:#94a3b8;margin-bottom:7px}
  input[type="text"]{
    width:100%;height:40px;background:#0b0b1a;border:1px solid rgba(255,255,255,0.1);
    border-radius:7px;color:#f1f5f9;font-size:20px;padding:0 12px;outline:none;
    direction:ltr;font-family:monospace;transition:border-color 0.15s
  }
  input[type="text"]:focus{border-color:rgba(99,102,241,0.6);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
  input[type="text"]::placeholder{color:#334155;font-family:inherit}

  .hint{font-size:16px;color:#475569;margin-top:6px;direction:ltr}

  .error{
    background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
    color:#fca5a5;border-radius:7px;padding:10px 12px;
    font-size:18px;margin-top:14px;display:none
  }

  button{
    width:100%;height:42px;margin-top:20px;border-radius:8px;border:none;
    background:#6366f1;color:#fff;font-size:21px;font-weight:600;
    cursor:pointer;transition:background 0.15s,box-shadow 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px
  }
  button:hover{background:#818cf8;box-shadow:0 0 20px rgba(99,102,241,0.4)}
  button:disabled{opacity:0.5;cursor:not-allowed}

  .footer{text-align:center;margin-top:18px;font-size:16px;color:#334155;line-height:1.6}
  .footer kbd{
    background:#0e0e1c;border:1px solid rgba(255,255,255,0.1);
    border-radius:4px;padding:1px 5px;font-family:monospace;font-size:15px
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">K</div>
    <div class="logo-text">
      <h1>Kiosk Player</h1>
      <p>הגדרת תחנת תצוגה</p>
    </div>
  </div>

  <div class="step">
    <div class="step-num">1</div>
    <span>בממשק הניהול, עבור לקיוסק הרצוי ← העתק קישור לקיוסק</span>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <span>הדבק את הקישור בשדה למטה ולחץ "התחל הצגה"</span>
  </div>

  <div style="margin-top:6px">
    <label>כתובת URL של הקיוסק</label>
    <input type="text" id="kioskUrl"
      placeholder="http://192.168.1.10:3000/kiosk.html?id=1"
      autofocus>
    <div class="hint">לדוגמה: http://192.168.1.10:3000/kiosk.html?id=1</div>
  </div>

  <div class="error" id="errorMsg"></div>

  <button id="startBtn" onclick="startPlayer()">
    <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M3 2l11 6-11 6V2z"/></svg>
    התחל הצגה במסך מלא
  </button>

  <div class="footer">
    לאיפוס ההגדרות: לחץ <kbd>F12</kbd> בזמן ריצה<br>
    ליציאה ממסך מלא: לחץ <kbd>ESC</kbd>
  </div>
</div>

<script>
  function startPlayer() {
    const url = document.getElementById('kioskUrl').value.trim();
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('startBtn');
    err.style.display = 'none';

    if (!url) {
      err.textContent = 'נא להזין כתובת URL';
      err.style.display = 'block';
      return;
    }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      err.textContent = 'הכתובת חייבת להתחיל ב- http:// או https://';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite"></span> מפעיל...';

    try {
      window.kioskAPI.saveUrl(url);
    } catch (e) {
      err.textContent = 'שגיאה: ' + e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'התחל הצגה במסך מלא';
    }
  }

  document.getElementById('kioskUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') startPlayer();
  });
</script>
</body>
</html>
