<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Kiosk</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

/* ── IFRAME ── */
#kiosk-frame{
  position:fixed;inset:0;width:100%;height:100%;border:none;
}

/* ── TRIGGER ZONE (top-left corner hover area) ── */
#trigger{
  position:fixed;top:0;left:0;width:48px;height:48px;z-index:9998;cursor:pointer;
}

/* ── GEAR ICON ── */
#gear-btn{
  position:fixed;top:10px;left:10px;z-index:9999;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:opacity 0.25s ease;
  color:rgba(255,255,255,0.75);
}
#trigger:hover ~ #gear-btn,
#gear-btn:hover,
#gear-btn.visible{opacity:1}

/* ── SETTINGS PANEL ── */
#settings-panel{
  position:fixed;top:14px;left:14px;z-index:10000;
  width:320px;background:#13132a;
  border:1px solid rgba(255,255,255,0.14);border-radius:14px;
  box-shadow:0 8px 40px rgba(0,0,0,0.8);
  display:none;animation:popIn 0.18s ease;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
#settings-panel.open{display:block}
@keyframes popIn{from{opacity:0;transform:scale(0.94) translateY(-4px)}to{opacity:1;transform:none}}

.sp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.07);
}
.sp-title{font-size:14px;font-weight:700;color:#f1f5f9}
.sp-close{
  width:24px;height:24px;border-radius:5px;border:1px solid rgba(255,255,255,0.1);
  background:transparent;color:#64748b;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s
}
.sp-close:hover{background:rgba(239,68,68,0.15);color:#ef4444;border-color:rgba(239,68,68,0.3)}

.sp-body{padding:14px 16px}
.sp-label{font-size:11px;font-weight:600;color:#64748b;margin-bottom:6px;display:block}
.sp-input{
  width:100%;height:36px;background:#0b0b1a;border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#f1f5f9;font-size:12px;padding:0 10px;outline:none;
  direction:ltr;font-family:monospace;transition:border-color 0.15s
}
.sp-input:focus{border-color:rgba(99,102,241,0.55);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.sp-hint{font-size:11px;color:#334155;margin-top:5px;direction:ltr}

.sp-error{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  color:#fca5a5;border-radius:6px;padding:8px 10px;
  font-size:11px;margin-top:10px;display:none
}

.sp-footer{display:flex;gap:8px;padding:10px 16px 14px;justify-content:flex-end}
.sp-btn{
  height:32px;padding:0 16px;border-radius:7px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit
}
.sp-btn-cancel{background:rgba(255,255,255,0.06);color:#94a3b8;border:1px solid rgba(255,255,255,0.1)}
.sp-btn-cancel:hover{background:rgba(255,255,255,0.1);color:#f1f5f9}
.sp-btn-save{background:#6366f1;color:#fff}
.sp-btn-save:hover{background:#818cf8;box-shadow:0 0 14px rgba(99,102,241,0.4)}
.sp-btn-save:disabled{opacity:0.45;cursor:not-allowed}
</style>
</head>
<body>

<iframe id="kiosk-frame" allowfullscreen></iframe>

<!-- Hover zone -->
<div id="trigger"></div>

<!-- Gear icon -->
<div id="gear-btn" title="שינוי קיוסק">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
    <circle cx="8" cy="8" r="2.5"/>
    <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/>
  </svg>
</div>

<!-- Settings panel -->
<div id="settings-panel">
  <div class="sp-header">
    <span class="sp-title">⚙ עדכון קיוסק</span>
    <button class="sp-close" id="closeBtn">✕</button>
  </div>
  <div class="sp-body">
    <label class="sp-label">כתובת URL של הקיוסק</label>
    <input type="text" class="sp-input" id="urlInput" placeholder="http://192.168.1.10:5190/kiosk.html?id=1">
    <div class="sp-hint" id="currentUrl"></div>
    <div class="sp-error" id="errMsg"></div>
  </div>
  <div class="sp-footer">
    <button class="sp-btn sp-btn-cancel" id="cancelBtn">ביטול</button>
    <button class="sp-btn sp-btn-save" id="saveBtn">עדכן וטען מחדש</button>
  </div>
</div>

<script>
  const frame     = document.getElementById('kiosk-frame');
  const gearBtn   = document.getElementById('gear-btn');
  const panel     = document.getElementById('settings-panel');
  const urlInput  = document.getElementById('urlInput');
  const saveBtn   = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const closeBtn  = document.getElementById('closeBtn');
  const errMsg    = document.getElementById('errMsg');
  const currentUrlEl = document.getElementById('currentUrl');

  // Load URL from query param
  const params = new URLSearchParams(window.location.search);
  let currentUrl = params.get('url') || '';
  if (currentUrl) {
    frame.src = currentUrl;
    currentUrlEl.textContent = 'נוכחי: ' + currentUrl;
  }

  // Show gear on trigger hover
  document.getElementById('trigger').addEventListener('mouseenter', () => {
    if (!panel.classList.contains('open')) gearBtn.classList.add('visible');
  });
  document.getElementById('trigger').addEventListener('mouseleave', () => {
    gearBtn.classList.remove('visible');
  });

  // Open panel
  gearBtn.addEventListener('click', () => {
    urlInput.value = currentUrl;
    errMsg.style.display = 'none';
    panel.classList.add('open');
    gearBtn.classList.remove('visible');
    setTimeout(() => urlInput.focus(), 80);
  });

  // Close panel
  function closePanel() { panel.classList.remove('open'); }
  closeBtn.addEventListener('click', closePanel);
  cancelBtn.addEventListener('click', closePanel);

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && panel.classList.contains('open')) closePanel();
  });

  // Save
  saveBtn.addEventListener('click', doSave);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });

  function doSave() {
    const url = urlInput.value.trim();
    errMsg.style.display = 'none';
    if (!url) {
      errMsg.textContent = 'נא להזין כתובת URL';
      errMsg.style.display = 'block';
      return;
    }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      errMsg.textContent = 'הכתובת חייבת להתחיל ב- http:// או https://';
      errMsg.style.display = 'block';
      return;
    }
    saveBtn.disabled = true;
    saveBtn.textContent = 'טוען...';
    try {
      window.kioskAPI.updateUrl(url);
    } catch(e) {
      errMsg.textContent = 'שגיאה: ' + e.message;
      errMsg.style.display = 'block';
      saveBtn.disabled = false;
      saveBtn.textContent = 'עדכן וטען מחדש';
    }
  }
</script>
</body>
</html>
