<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Display</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        #kiosk-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #message-content {
            color: #fff;
            font-size: 5vw;
            text-align: center;
            padding: 40px;
            background: #222;
            border: 5px solid #007bff;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }

        #no-links-msg {
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            font-size: 3vw;
        }
    </style>
</head>

<body>



    <div id="no-links-msg">Waiting for content...</div>
    <iframe id="kiosk-iframe" style="display:none;"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>

    <div id="message-overlay">
        <div id="message-content"></div>
    </div>

    <script src="kiosk-app.js"></script>

</body>

</html>
