<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Setup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 80%;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            border-radius: 5px;
            border: 1px solid #555;
            background: #444;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Kiosk Manager Setup</h2>
        <p>Please enter the Kiosk Server local address below:</p>
        <input type="text" id="server-url" placeholder="http://192.168.1.10:3000" autofocus>
        <button id="save-btn">Connect</button>
        <p style="font-size: 12px; margin-top:20px; color:#aaa;">(To reopen this, run the manager app with --reset)</p>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById("save-btn").addEventListener("click", () => {
            let url = document.getElementById("server-url").value.trim();
            if (url) {
                // Remove trailing slash if user accidently added it
                if (url.endsWith('/')) url = url.slice(0, -1);
                ipcRenderer.send("save-url", url);
            } else {
                alert("Please enter a valid Server URL.");
            }
        });

        document.getElementById("server-url").addEventListener("keypress", (e) => {
            if (e.key === 'Enter') {
                document.getElementById("save-btn").click();
            }
        });
    </script>
</body>

</html>
