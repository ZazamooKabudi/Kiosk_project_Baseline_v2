<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; }

    #kiosk-iframe { width: 100%; height: 100%; border: none; display: none; }
    #kiosk-img { width: 100%; height: 100%; object-fit: contain; display: none; background: #000; }

    /* No content state */
    #no-content {
      display: none; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #0d0d2e 0%, #000 100%);
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #no-content.show { display: flex; }
    .no-content-logo { font-size: 48px; font-weight: 900; background: linear-gradient(135deg,#6366f1,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .no-content-text { font-size: 22px; color: rgba(255,255,255,0.4); font-weight: 300; }

    /* Message overlay */
    #msg-overlay {
      position: fixed; inset: 0; display: none;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; z-index: 9999;
    }
    #msg-overlay.show { display: flex; }
    #msg-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(167,139,250,0.08));
      border: 1.5px solid rgba(99,102,241,0.5);
      border-radius: 24px; padding: 52px 60px;
      max-width: 75%; text-align: center;
      box-shadow: 0 0 80px rgba(99,102,241,0.3), 0 0 0 1px rgba(255,255,255,0.05);
      animation: msgIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes msgIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: none; } }
    #msg-icon { font-size: 3vw; margin-bottom: 20px; opacity: 0.8; }
    #msg-text { font-size: 5vw; font-weight: 700; line-height: 1.3; color: #fff; text-shadow: 0 2px 20px rgba(99,102,241,0.5); }
    #msg-timer { margin-top: 24px; font-size: 1.2vw; color: rgba(255,255,255,0.35); letter-spacing: 1px; }

    /* Progress bar */
    #progress-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,0.05); z-index: 100;
    }
    #progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); width: 100%; transition: none; }
  </style>
</head>
<body>
  <div id="no-content">
    <div class="no-content-logo">K</div>
    <div class="no-content-text">ממתין לתוכן...</div>
  </div>

  <iframe id="kiosk-iframe"
    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation">
  </iframe>
  <img id="kiosk-img" alt="">

  <div id="msg-overlay">
    <div id="msg-box">
      <div id="msg-icon">📢</div>
      <div id="msg-text"></div>
      <div id="msg-timer"></div>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <script src="kiosk-app.js"></script>
</body>
</html>
